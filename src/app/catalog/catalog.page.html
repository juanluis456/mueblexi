<ion-header class="ion-no-border">
  <ion-toolbar style="--background: var(--ion-background-color);">
    <ion-title style="color: white; font-weight: bold;">Catálogo</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" color="light">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let p of products">
        
        <ion-card class="product-card" (click)="viewDetail(p)">
          <div class="image-container">
            <img [src]="p.image" alt="{{ p.name }}" />
          </div>
          
          <ion-card-header>
            <ion-card-title class="product-name">{{ p.name }}</ion-card-title>
          </ion-card-header>

          <ion-card-content>
            <div class="price-container">
              <span class="price-label">Precio total:</span>
              <span class="price-value">${{ p.price | number:'1.2-2' }}</span>
            </div>
            
            <ion-button expand="block" color="primary" class="detail-btn">
              Ver Detalles
            </ion-button>
          </ion-card-content>
        </ion-card>

      </ion-col>
    </ion-row>
  </ion-grid>

  <div class="ion-padding-top ion-margin-bottom">
    <ion-button expand="block" color="warning" routerLink="/register-payment">
      [TEST] Ir a Registrar Abono
    </ion-button>
  </div>

</ion-content>
