<ion-header class="ion-no-border">
  <ion-toolbar style="--background: transparent;">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" color="light">
        <ion-icon name="arrow-back" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title style="color: white; font-weight: bold;">Registrar Abono</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <div class="content-center">
    
    <div class="form-card">
      
      <div class="info-section">
        <h3 class="info-label">Cliente:</h3>
        <p class="info-value">{{ contextData.clientName }}</p>
        
        <h3 class="info-label">Producto:</h3>
        <p class="info-value">{{ contextData.productName }}</p>

        <h3 class="info-label">Saldo Pendiente:</h3>
        <p class="debt-value">${{ contextData.remainingDebt | number:'1.2-2' }}</p>
      </div>

      <hr class="separator">

      <ion-item lines="none" class="input-item">
        <ion-label position="floating">Monto del abono ($)</ion-label>
        <ion-input type="number" [(ngModel)]="paymentData.amount" placeholder="0.00"></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-label position="stacked">Fecha</ion-label>
        <ion-datetime-button datetime="datetime"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="datetime" presentation="date" [(ngModel)]="paymentData.date"></ion-datetime>
          </ng-template>
        </ion-modal>
      </ion-item>

      <ion-button expand="block" color="primary" class="save-button ion-margin-top" (click)="savePayment()">
        Registrar Abono
      </ion-button>

    </div>

  </div>

</ion-content>
